services:
  wordpress:
    image: wordpress:latest
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - "${HOST_DATA_DIR:-./data}/html:/var/www/html"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: "${WORDPRESS_DB_NAME:-wordpress}"
      WORDPRESS_DB_USER: "${WORDPRESS_DB_USER:-wordpress}"
      WORDPRESS_DB_PASSWORD: "${WORDPRESS_DB_PASSWORD:-change-me}"
      TZ: "${TZ:-Asia/Tokyo}"

  db:
    image: mariadb:11
    restart: unless-stopped
    ports:
      - "${DB_PORT:-33060}:3306"
    volumes:
      - "${HOST_DATA_DIR:-./data}/db:/var/lib/mysql"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-change-me-root}"
      MYSQL_DATABASE: "${WORDPRESS_DB_NAME:-wordpress}"
      MYSQL_USER: "${WORDPRESS_DB_USER:-wordpress}"
      MYSQL_PASSWORD: "${WORDPRESS_DB_PASSWORD:-change-me}"
      TZ: "${TZ:-Asia/Tokyo}"

